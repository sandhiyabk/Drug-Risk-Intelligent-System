version: 2

models:
  - name: fct_risk_signals
    description: >
      Final analytics model calculating risk signals for drug-reaction pairs. 
      Uses Reporting Odds Ratio (ROR) and Proportional Reporting Ratio (PRR) to detect disproportionality.
      Significance is defined as PRR > 2.0 and report count >= 50.
    config:
      snowflake_warehouse: DRUG_RISK_WH

    columns:
      - name: drug_name
        description: The name of the drug being analyzed.
        tests:
          - not_null

      - name: reaction_term
        description: The adverse reaction term being analyzed.
        tests:
          - not_null

      - name: report_count
        description: Number of reports containing both the drug and the reaction (A count).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 50"

      - name: ror
        description: Reporting Odds Ratio (ROR). (A/B) / (C/D).
        tests:
          - not_negative

      - name: prr
        description: Proportional Reporting Ratio (PRR). (A / (A+B)) / (C / (C+D)).
        tests:
          - not_negative

      - name: signal_strength
        description: Categorization of signal based on PRR (HIGH, ELEVATED, BASELINE).
        tests:
          - accepted_values:
              values: ['HIGH', 'ELEVATED', 'BASELINE']

      - name: is_significant_signal
        description: Boolean flag indicating if the pair meets signal detection criteria.
        tests:
          - not_null