version: 2

models:
  - name: stg_faers_reports
    description: >
      Primary staging model for FAERS safety reports. Extracts top-level administrative and 
      patient information from the raw JSON variant. This model implements incremental loading 
      and deduplication logic.
    config:
      snowflake_warehouse: DRUG_RISK_WH

    columns:
      - name: report_id
        description: Unique FAERS report identifier (safetyreportid). Primary key for safety reports.
        tests:
          - unique:
              config:
                where: "src_ld_ts > '1900-01-01'"
          - not_null

      - name: received_date
        description: The date the report was first received by the FDA.
        tests:
          - not_null

      - name: reception_date
        description: Secondary reception date for tracking administrative updates.

      - name: safety_report_version
        description: Version number of the safety report (identifies updates to existing cases).

      - name: transmission_date
        description: The date the report was transmitted to the system.

      - name: patient_age
        description: Age of the patient at the time of the event.
        tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 120"

      - name: patient_age_days
        description: Patient age expressed in days.

      - name: patient_age_years
        description: Patient age expressed in years.
        tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 120"

      - name: patient_sex
        description: >
          Patient sex code: 0=Male, 1=Female, 2=Unknown.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2]

      - name: reaction_onset_date
        description: The date when the adverse reaction first started.

      - name: patient_weight_kg
        description: Patient weight recorded in kilograms.

      - name: patient_height_cm
        description: Patient height recorded in centimeters.

      - name: source_country
        description: Country code of the primary reporter.

      - name: src_ld_ts
        description: Metadata - Timestamp when the record was loaded into the staging area.
        tests:
          - not_null

      - name: src_ld_date
        description: Metadata - Date when the record was loaded.

      - name: source_file
        description: The name of the source JSON file for data lineage and auditing.
        tests:
          - not_null