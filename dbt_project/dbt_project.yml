name: drug_risk_pipeline
version: '1.0.0'
config-version: 2
profile: drug_risk_pipeline

vars:
  snowflake_warehouse: DRUG_RISK_WH
  source_database: DRUG_INTEL_DB
  source_schema: RAW
  staging_schema: STAGING
  analytics_schema: ANALYTICS

on-run-start:
  - "{{ log('Running Drug Risk Intelligence Pipeline - dbt transformations', info=True) }}"

models:
  drug_risk_pipeline:
    staging:
      +schema: STAGING
      +materialized: incremental
    intermediate:
      +schema: STAGING
      +materialized: incremental
    analytics:
      +schema: ANALYTICS
      +materialized: table  # Keep as table for dashboard performance, but could be incremental if partitioned by date.


seeds:
  +schema: STAGING
  +database: DRUG_INTEL_DB

tests:
  +schema: STAGING
  +database: DRUG_INTEL_DB

snapshots:
  +schema: STAGING
  +database: DRUG_INTEL_DB